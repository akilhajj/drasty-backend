name: Build Drasty App APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - id: checkout
        name: Checkout repository
        uses: actions/checkout@v4

      - id: setup-flutter
        name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - id: generate-android-structure
        name: Generate Perfect Android Structure
        run: |
          # حيلة برمجية ذكية لتوليد ملفات أندرويد والـ Gradle سحابياً بالكامل لتخطي الخطأ الحمراء
          cd ..
          flutter create --org net.drasty --template=app drasty_project
          cp -r drasty_project/android $GITHUB_WORKSPACE/
          cp -r drasty_project/ios $GITHUB_WORKSPACE/

      - id: build-apk
        name: Build APK Release
        run: |
          # تجميع واجهات التطبيق الموحدة واستخراج ملف التثبيت النهائي بأصغر حجم
          flutter pub get
          flutter build apk --release

      - id: upload-artifact
        name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: drasty-app-release
          path: build/app/outputs/flutter-apk/app-release.apk
