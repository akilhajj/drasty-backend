<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drasty Institute | معهد دراستي الرقمي الفاخر</title>
    <!-- استدعاء الخطوط والرموز الفاخرة للجيل الجديد -->
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root {
            --primary: #c5a85c; /* أصفر ملكي */
            --primary-glowing: #ffd700; /* ذهبي لامع متوهج */
            --dark-bg: #090d16; /* أسود ملكي عميق */
            --card-glass: rgba(15, 23, 42, 0.6); /* زجاجي ضبابي فاخر */
            --text-light: #f8fafc;
            --text-gray: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-light);
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: 80px; 
        }

        /* القائمة العلوية للهيدر - شاشات العرض الكبيرة */
        header {
            background: rgba(9, 13, 22, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(197, 168, 92, 0.15);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
        }

        .logo-img {
            height: 65px;
            width: auto;
            filter: drop-shadow(0 0 8px rgba(197, 168, 92, 0.3));
        }

        nav.desktop-nav {
            display: flex;
            gap: 25px;
        }

        nav.desktop-nav a {
            text-decoration: none;
            color: var(--text-gray);
            font-weight: 600;
            transition: color 0.3s, transform 0.3s;
        }

        nav.desktop-nav a:hover {
            color: var(--primary-glowing);
            transform: translateY(-2px);
        }

        .btn-top-login {
            background: linear-gradient(135deg, var(--primary), #aa8f46);
            color: white;
            padding: 8px 22px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(197, 168, 92, 0.25);
            transition: all 0.3s ease;
        }

        .btn-top-login:hover {
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.4);
            transform: scale(1.03);
        }

        /* 📱 شريط التنقل السفلي الاحترافي والمتأقلم والمتحرك للموبايل */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 68px;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(197, 168, 92, 0.25);
            display: none; 
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
            border-radius: 20px 20px 0 0;
            box-shadow: 0 -8px 32px rgba(0, 0, 0, 0.6);
        }

        .bottom-nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-gray);
            text-decoration: none;
            font-size: 11px;
            font-weight: 600;
            width: 65px;
            height: 100%;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .bottom-nav-item i {
            font-size: 22px;
            margin-bottom: 4px;
            transition: transform 0.3s ease;
        }

        .bottom-nav-item.active {
            color: var(--primary-glowing);
        }

        .bottom-nav-item.active i {
            transform: translateY(-6px);
            filter: drop-shadow(0 0 8px var(--primary-glowing));
        }

        /* شاشات عرض المحتوى والترحيب */
        .hero-section {
            max-width: 1200px;
            margin: 40px auto;
            padding: 20px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 40px;
        }

        .hero-text {
            flex: 1;
            min-width: 300px;
        }

        .hero-text h1 {
            font-size: 44px;
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 20px;
            background: linear-gradient(120deg, #ffffff, var(--primary-glowing));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-text p {
            color: var(--text-gray);
            font-size: 17px;
            margin-bottom: 35px;
            line-height: 1.7;
        }

        .hero-image {
            flex: 1;
            min-width: 300px;
            text-align: center;
        }

        .hero-image img {
            max-width: 100%;
            height: auto;
            max-height: 400px;
            filter: drop-shadow(0 10px 25px rgba(197, 168, 92, 0.25));
            animation: floatAnimation 4s ease-in-out infinite;
        }

        @keyframes floatAnimation {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }

        /* عدادات الإحصائيات الديناميكية المدارة من الأدمن */
        .counters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 20px auto 40px auto;
            padding: 0 20px;
        }

        .counter-card {
            background: linear-gradient(135deg, rgba(197, 168, 92, 0.08), rgba(0,0,0,0));
            border: 1px solid rgba(197, 168, 92, 0.18);
            padding: 25px 20px;
            border-radius: 14px;
            text-align: center;
            backdrop-filter: blur(5px);
        }

        .counter-card .num {
            font-size: 38px;
            font-weight: 700;
            color: var(--primary-glowing);
            text-shadow: 0 0 10px rgba(197, 168, 92, 0.2);
        }

        .counter-card .label {
            font-size: 14px;
            color: var(--text-gray);
            margin-top: 6px;
            font-weight: 600;
        }

        /* أقسام الميزات وجداول البيانات للطلاب المسجلين */
        section.main-wrapper {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-title {
            text-align: center;
            font-size: 32px;
            margin-bottom: 40px;
            color: white;
            font-weight: 700;
        }

        .section-title span {
            color: var(--primary-glowing);
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .glass-card {
            background: var(--card-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(197, 168, 92, 0.12);
            padding: 30px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            transition: all 0.4s ease;
        }

        .glass-card:hover {
            border-color: rgba(255, 215, 0, 0.35);
            transform: translateY(-6px);
        }

        .glass-card i {
            font-size: 45px;
            color: var(--primary-glowing);
            margin-bottom: 20px;
            filter: drop-shadow(0 0 8px rgba(197, 168, 92, 0.35));
        }

        .glass-card h3 {
            font-size: 20px;
            margin-bottom: 12px;
            color: white;
        }

        .glass-card p {
            color: var(--text-gray);
            font-size: 14px;
            line-height: 1.6;
        }

        /* لوحة الطلاب الخاصة المحمية بعد تسجيل الدخول */
        .student-portal-section {
            background: rgba(15, 23, 42, 0.4);
            border: 1px dashed rgba(197, 168, 92, 0.25);
            border-radius: 16px;
            padding: 35px 25px;
            margin-bottom: 40px;
            display: none; /* تظهر فقط للطلاب المسجلين */
        }

        .subject-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
            margin-top: 25px;
        }

        .subject-card {
            background: rgba(30, 41, 59, 0.45);
            border-radius: 12px;
            padding: 22px;
            border-right: 5px solid var(--primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .subject-card a {
            background: linear-gradient(135deg, var(--primary), #aa8f46);
            color: white;
            padding: 7px 16px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 700;
            font-size: 13px;
        }

        /* قسم آراء الطلاب المدار من المسؤول */
        .testimonials-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

    <!-- العمليات البرمجية والربط الذكي للموقع والمشاهد -->
    <script>
        let isLoggedIn = false;

        function showView(viewName) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.getElementById('publicNav').style.display = (viewName === 'dashboard') ? 'none' : 'block';
            
            if(viewName === 'landing') document.getElementById('landingView').classList.add('active');
            if(viewName === 'login') document.getElementById('loginView').classList.add('active');
            if(viewName === 'dashboard') document.getElementById('dashboardView').classList.add('active');
        }

        function handleAuthNav() {
            if(isLoggedIn) {
                isLoggedIn = false;
                document.getElementById('authBtn').innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> دخول الإدارة';
                showView('landing');
            } else {
                showView('login');
            }
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value;

            if(user === 'admin' && pass === 'drasty2026') {
                isLoggedIn = true;
                document.getElementById('authBtn').innerHTML = '<i class="fa-solid fa-power-off"></i> خروج';
                document.getElementById('loginError').style.display = 'none';
                this.reset();
                showView('dashboard');
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        });

        function switchDashTab(tabId) {
            document.querySelectorAll('.dash-sub-section').forEach(ts => ts.classList.remove('active'));
            document.querySelectorAll('.sidebar button').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            if(tabId === 'dash-home') document.getElementById('btn-dash').classList.add('active');
            if(tabId === 'dash-curriculum') document.getElementById('btn-curric').classList.add('active');
            if(tabId === 'dash-students') document.getElementById('btn-students').classList.add('active');
        }

        let curriculums = JSON.parse(localStorage.getItem('drasty_curriculums')) || [];
        function drawCurriculums() {
            const tbody = document.getElementById('curriculumTable');
            tbody.innerHTML = '';
            curriculums.forEach((item, idx) => {
                tbody.innerHTML += `<tr><td>${item.name}</td><td><a href="${item.link}" target="_blank">فتح الرابط <i class="fa-solid fa-arrow-up-right-from-square"></i></a></td><td><button class="btn-delete" onclick="deleteCurriculum(${idx})">حذف</button></td></tr>`;
            });
        }
        document.getElementById('curriculumForm').addEventListener('submit', function(e) {
            e.preventDefault();
            curriculums.push({ name: document.getElementById('subjectName').value, link: document.getElementById('subjectLink').value });
            localStorage.setItem('drasty_curriculums', JSON.stringify(curriculums));
            drawCurriculums();
            this.reset();
        });
        function deleteCurriculum(idx) {
            curriculums.splice(idx, 1);
            localStorage.setItem('drasty_curriculums', JSON.stringify(curriculums));
            drawCurriculums();
        }

        let students = JSON.parse(localStorage.getItem('drasty_students')) || [];
        function drawStudents() {
            const tbody = document.getElementById('studentTable');
            tbody.innerHTML = '';
            students.forEach((item, idx) => {
                tbody.innerHTML += `<tr><td>${item.name}</td><td>${item.class}</td><td><button class="btn-delete" onclick="deleteStudent(${idx})">حذف</button></td></tr>`;
            });
        }
        document.getElementById('studentForm').addEventListener('submit', function(e) {
            e.preventDefault();
            students.push({ name: document.getElementById('studentName').value, class: document.getElementById('studentClass').value });
            localStorage.setItem('drasty_students', JSON.stringify(students));
            drawStudents();
            this.reset();
        });
        function deleteStudent(idx) {
            students.splice(idx, 1);
            localStorage.setItem('drasty_students', JSON.stringify(students));
            drawStudents();
        }

        drawCurriculums();
        drawStudents();

                // 🔄 محرك الأستاذ الافتراضي الموجه ذكياً حسب تخصص الطالب ومرحلته الدراسية
        let currentLessonIndex = 1;
        
        function initAiTutorEngine() {
            const sClass = sessionStorage.getItem('student_class') || 'بكالوريا - فرع علمي';
            const sReligion = sessionStorage.getItem('student_religion') || 'إسلامية';
            const sName = sessionStorage.getItem('student_name') || 'الطالب';
            const chatBody = document.getElementById('cmsReviewsList'); // سحب واجهة الحوار

            // تخصيص الترحيب وإصدار الخطة المقررة فوراً بناء على بيانات الطالب
            if(chatBody) {
                chatBody.innerHTML = `
                    <div class="review-card" style="border-right: 4px solid var(--primary-glowing);">
                        <div class="stars"><i class="fa-solid fa-robot"></i> <strong>الاستاذ الافتراضي (Drasty AI)</strong></div>
                        <p>أهلاً بك يا طالبنا المتميز <strong>${sName}</strong>. لقد قمت بتحليل تخصصك الدراسي الموثق كطالب <strong>(${sClass})</strong> وتدرس مادة <strong>(التربية الـ${sReligion})</strong>.</p>
                        <p>بصفتي أستاذك الفعلي المتاح لك على مدار 24 ساعة، قمت بجدولة حصصك الدراسية بالترتيب، وتجهيز الفروض والامتحانات الدورية الموقوتة شهرياً.</p>
                        <button class="btn-top-login" style="margin-top:10px; padding:6px 15px; font-size:12px;" onclick="triggerAiLesson()">ابدأ الحصة الأولى الآن 📚</button>
                    </div>`;
            }
        }

        // 🔄 محرك توليد الحصص التدريجية والفروض التفاعلية صوت وصورة
        function triggerAiLesson() {
            const chatBody = document.getElementById('cmsReviewsList');
            let replyText = "";

            if(currentLessonIndex === 1) {
                replyText = `📚 <strong>الحصة النظامية المقررة رقم (1): الشرح الاحترافي المفهوم</strong><br><br>
                             مرحباً بك في حصتك الأولى. اليوم سنقوم بشرح الفقرة التأسيسية الهامة المتوقعة امتحانياً وفق المنهاج السوري لعام 2026 المرفوع في لوحتك.<br>
                             انتبه جيداً للأمثلة والقوانين الأساسية التي تظهر أمامك، وسأقوم بنطق الشرح صوتياً لتسهيل الاستيعاب...<br><br>
                             📝 <strong>هل أنت مستعد الآن للانتقال الفوري إلى (الفرض الفوري) لتثبيت الفهم؟ (انقر على الزر بالأسفل)</strong><br><br>
                             <button class="btn-top-login" style="background:#22c55e; padding:5px 12px; font-size:11px;" onclick="triggerAiAssignment()">جاهز لحل الفرض الدوري 📝</button>`;
                currentLessonIndex = 2;
            }
            
            chatBody.innerHTML += `<div class="review-card" style="margin-top:15px; border-right:4px solid var(--primary);"><p>${replyText}</p></div>`;
            speakAiResponse("أهلاً بك في حصتك الأولى. اليوم سنبدأ بالشرح الاحترافي المفهوم للمادة المقررة حسب فرعك الدراسي.");
        }
        // 📝 محرك توليد الفروض والامتحانات الموقوتة والامتحانات الشاملة
        function triggerAiAssignment() {
            const chatBody = document.getElementById('cmsReviewsList');
            const assignmentText = `📝 <strong>الفرض الدوري لحساب مستوى الفهم الفوري:</strong><br><br>
                                    بناءً على الشرح السابق، أجب بدقة على السؤال التالي:<br>
                                    <strong>س: ما هو الفرق الجوهري في التطبيق بين المسائل العلمية والنظرية وفق منهاجك المعتمد؟</strong><br><br>
                                    قم بكتابة الحل أو تحدث صوتياً، وسأقوم بتصحيح جوابك فوراً ومنحك علامة دقيقة تشبه المعهد الحقيقي!<br><br>
                                    <button class="btn-top-login" style="background:#3b82f6; padding:5px 12px; font-size:11px;" onclick="triggerAiExam()">الانتقال للامتحان الشامل الموقوت ⏱️</button>`;
            
            chatBody.innerHTML += `<div class="review-card" style="margin-top:15px; border-right:4px solid #22c55e;"><p>${assignmentText}</p></div>`;
            speakAiResponse("يرجى الإجابة بدقة على سؤال الفرض الدوري الظاهر أمامك للتأكد من فهمك الكامل للحصة.");
        }

        function triggerAiExam() {
            const chatBody = document.getElementById('cmsReviewsList');
            const examText = `⏱️ <strong>محاكاة الامتحان الشامل المجدول (موقت زمني 30 دقيقة نشط الآن):</strong><br><br>
                              تم توليد ورقة الامتحان المخصصة لفرعك ومرحلتك بناءً على المناهج المرفوعة من الإدارة بنجاح 100%.<br><br>
                              • <strong>السؤال الأول:</strong> اختر الإجابة الصحيحة من الخيارات المتاحة...<br>
                              • <strong>السؤال الثاني:</strong> علل علمياً الظاهرة المطروحة في الفصل الأول...<br><br>
                              ⚠️ ابدأ بالحل فوراً، وسيتم سحب ورقة الامتحان آلياً وتصحيحها فور انتهاء المؤقت لإرسال تقرير علاماتك ونقاط ضعفك إلى لوحة الأستاذ والمراقب البشري.`;
            
            chatBody.innerHTML += `<div class="review-card" style="margin-top:15px; border-right:4px solid #ef4444;"><p>${examText}</p></div>`;
            speakAiResponse("بدأ الآن الامتحان الشامل الموقوت. يرجى التركيز والبدء بالحل قبل انتهاء الوقت المحدد.");
        }

        // 🔊 محرك نطق الشرح والردود صوتياً (Text-to-Speech)
        function speakAiResponse(textToSpeak) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); // إيقاف أي صوت سابق فوراً
                const utterance = new SpeechSynthesisUtterance(textToSpeak);
                utterance.lang = 'ar-SA'; // تعيين اللغة العربية الفصحى الفاخرة للشرح
                utterance.pitch = 1.0;
                utterance.rate = 1.0; // سرعة شرح طبيعية ومفهومة جداً
                window.speechSynthesis.speak(utterance);
            }
        }

        // تشغيل محرك الأستاذ الافتراضي تلقائياً عند تحميل الصفحة للطالب المسجل دخول
        const originalPortalSync = window.onload;
        window.onload = function() {
            if (typeof originalPortalSync === 'function') originalPortalSync();
            if(sessionStorage.getItem('student_logged_in') === 'true') {
                initAiTutorEngine();
            }
        }

    </script>
</body>
</html>
