<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drasty Institute | معهد دراستي الرقمي الفاخر</title>
    <!-- استدعاء الخطوط والرموز الفاخرة للجيل الجديد -->
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root {
            --primary: #c5a85c; /* أصفر ملكي */
            --primary-glowing: #ffd700; /* ذهبي لامع متوهج */
            --dark-bg: #090d16; /* أسود ملكي عميق */
            --card-glass: rgba(15, 23, 42, 0.6); /* زجاجي ضبابي فاخر */
            --text-light: #f8fafc;
            --text-gray: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-light);
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: 80px; 
        }

        /* القائمة العلوية للهيدر - شاشات العرض الكبيرة */
        header {
            background: rgba(9, 13, 22, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(197, 168, 92, 0.15);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
        }

        .logo-img {
            height: 65px;
            width: auto;
            filter: drop-shadow(0 0 8px rgba(197, 168, 92, 0.3));
        }

        nav.desktop-nav {
            display: flex;
            gap: 25px;
        }

        nav.desktop-nav a {
            text-decoration: none;
            color: var(--text-gray);
            font-weight: 600;
            transition: color 0.3s, transform 0.3s;
        }

        nav.desktop-nav a:hover {
            color: var(--primary-glowing);
            transform: translateY(-2px);
        }

        .btn-top-login {
            background: linear-gradient(135deg, var(--primary), #aa8f46);
            color: white;
            padding: 8px 22px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(197, 168, 92, 0.25);
            transition: all 0.3s ease;
        }

        .btn-top-login:hover {
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.4);
            transform: scale(1.03);
        }

        /* 📱 شريط التنقل السفلي الاحترافي والمتأقلم والمتحرك للموبايل */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 68px;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(197, 168, 92, 0.25);
            display: none; 
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
            border-radius: 20px 20px 0 0;
            box-shadow: 0 -8px 32px rgba(0, 0, 0, 0.6);
        }

        .bottom-nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-gray);
            text-decoration: none;
            font-size: 11px;
            font-weight: 600;
            width: 65px;
            height: 100%;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .bottom-nav-item i {
            font-size: 22px;
            margin-bottom: 4px;
            transition: transform 0.3s ease;
        }

        .bottom-nav-item.active {
            color: var(--primary-glowing);
        }

        .bottom-nav-item.active i {
            transform: translateY(-6px);
            filter: drop-shadow(0 0 8px var(--primary-glowing));
        }

        /* شاشات عرض المحتوى والترحيب */
        .hero-section {
            max-width: 1200px;
            margin: 40px auto;
            padding: 20px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 40px;
        }

        .hero-text {
            flex: 1;
            min-width: 300px;
        }

        .hero-text h1 {
            font-size: 44px;
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 20px;
            background: linear-gradient(120deg, #ffffff, var(--primary-glowing));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-text p {
            color: var(--text-gray);
            font-size: 17px;
            margin-bottom: 35px;
            line-height: 1.7;
        }

        .hero-image {
            flex: 1;
            min-width: 300px;
            text-align: center;
        }

        .hero-image img {
            max-width: 100%;
            height: auto;
            max-height: 400px;
            filter: drop-shadow(0 10px 25px rgba(197, 168, 92, 0.25));
            animation: floatAnimation 4s ease-in-out infinite;
        }

        @keyframes floatAnimation {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }

        /* عدادات الإحصائيات الديناميكية المدارة من الأدمن */
        .counters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 20px auto 40px auto;
            padding: 0 20px;
        }

        .counter-card {
            background: linear-gradient(135deg, rgba(197, 168, 92, 0.08), rgba(0,0,0,0));
            border: 1px solid rgba(197, 168, 92, 0.18);
            padding: 25px 20px;
            border-radius: 14px;
            text-align: center;
            backdrop-filter: blur(5px);
        }

        .counter-card .num {
            font-size: 38px;
            font-weight: 700;
            color: var(--primary-glowing);
            text-shadow: 0 0 10px rgba(197, 168, 92, 0.2);
        }

        .counter-card .label {
            font-size: 14px;
            color: var(--text-gray);
            margin-top: 6px;
            font-weight: 600;
        }

        /* أقسام الميزات وجداول البيانات للطلاب المسجلين */
        section.main-wrapper {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-title {
            text-align: center;
            font-size: 32px;
            margin-bottom: 40px;
            color: white;
            font-weight: 700;
        }

        .section-title span {
            color: var(--primary-glowing);
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .glass-card {
            background: var(--card-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(197, 168, 92, 0.12);
            padding: 30px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            transition: all 0.4s ease;
        }

        .glass-card:hover {
            border-color: rgba(255, 215, 0, 0.35);
            transform: translateY(-6px);
        }

        .glass-card i {
            font-size: 45px;
            color: var(--primary-glowing);
            margin-bottom: 20px;
            filter: drop-shadow(0 0 8px rgba(197, 168, 92, 0.35));
        }

        .glass-card h3 {
            font-size: 20px;
            margin-bottom: 12px;
            color: white;
        }

        .glass-card p {
            color: var(--text-gray);
            font-size: 14px;
            line-height: 1.6;
        }

        /* لوحة الطلاب الخاصة المحمية بعد تسجيل الدخول */
        .student-portal-section {
            background: rgba(15, 23, 42, 0.4);
            border: 1px dashed rgba(197, 168, 92, 0.25);
            border-radius: 16px;
            padding: 35px 25px;
            margin-bottom: 40px;
            display: none; /* تظهر فقط للطلاب المسجلين */
        }

        .subject-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
            margin-top: 25px;
        }

        .subject-card {
            background: rgba(30, 41, 59, 0.45);
            border-radius: 12px;
            padding: 22px;
            border-right: 5px solid var(--primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .subject-card a {
            background: linear-gradient(135deg, var(--primary), #aa8f46);
            color: white;
            padding: 7px 16px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 700;
            font-size: 13px;
        }

        /* قسم آراء الطلاب المدار من المسؤول */
        .testimonials-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

                </div>
            </section>
        </main>
        <footer><p>&copy; 2026 Drasty Institute. جميع الحقوق محفوظة.</p></footer>
    </div>
