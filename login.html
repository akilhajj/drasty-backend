<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الدخول الموحدة | Drasty Institute</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root {
            --primary: #c5a85c;
            --primary-glowing: #ffd700;
            --dark-bg: #090d16;
            --card-glass: rgba(15, 23, 42, 0.65);
            --text-light: #f8fafc;
            --text-gray: #94a3b8;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        body { 
            background-color: var(--dark-bg); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0;
            padding: 20px;
        }
        .auth-container {
            background: var(--card-glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(197, 168, 92, 0.2);
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
            width: 100%;
            max-width: 460px;
            text-align: center;
        }
        .auth-container img { height: 85px; margin-bottom: 15px; filter: drop-shadow(0 0 6px rgba(197,168,92,0.3)); }
        
        .tab-buttons { display: flex; margin-bottom: 25px; border-bottom: 1px solid rgba(197,168,92,0.1); }
        .tab-buttons button { flex: 1; padding: 12px; background: none; border: none; font-size: 16px; font-weight: bold; cursor: pointer; color: var(--text-gray); transition: all 0.3s; }
        .tab-buttons button.active { color: var(--primary-glowing); border-bottom: 3px solid var(--primary-glowing); font-size: 17px; }
        
        .auth-form { display: none; }
        .auth-form.active { display: block; }
        
        .form-group { margin-bottom: 18px; text-align: right; }
        label { display: block; margin-bottom: 6px; color: var(--text-light); font-size: 14px; font-weight: 600; }
        input, select { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid rgba(197, 168, 92, 0.2); 
            background: rgba(15, 23, 42, 0.6);
            border-radius: 8px; 
            font-size: 14px; 
            color: white;
            outline: none;
            transition: all 0.3s;
        }
        input:focus, select:focus { border-color: var(--primary-glowing); box-shadow: 0 0 8px rgba(255,215,0,0.2); }
        select option { background: #0f172a; color: white; }
        
        .file-upload-wrapper {
            border: 2px dashed rgba(197, 168, 92, 0.3);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            background: rgba(15, 23, 42, 0.4);
            cursor: pointer;
            transition: all 0.3s;
        }
        .file-upload-wrapper:hover { border-color: var(--primary-glowing); background: rgba(197,168,92,0.05); }

        .btn-submit { 
            background: linear-gradient(135deg, var(--primary), #aa8f46); 
            color: white; 
            border: none; 
            padding: 13px; 
            width: 100%; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 16px; 
            margin-top: 15px; 
            box-shadow: 0 4px 15px rgba(197,168,92,0.2);
            transition: all 0.3s;
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(255,215,0,0.4); }
        
        .msg { margin-top: 12px; font-size: 14px; display: none; padding: 10px; border-radius: 6px; }
        .error-msg { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); }
        .success-msg { background: rgba(34, 197, 94, 0.1); color: #22c55e; border: 1px solid rgba(34, 197, 94, 0.2); }
    </style>
</head>
<body>

<div class="auth-container">
    <img id="loginLogo" src="https://ibb.co" alt="Drasty Luxury Logo">
    
    <div class="tab-buttons">
        <button id="tabLogin" class="active" onclick="switchAuthTab('login')">تسجيل الدخول</button>
        <button id="tabRegister" onclick="switchAuthTab('register')">طلب تسجيل طالب</button>
    </div>

    <!-- 🔐 1. نموذج الدخول الموحد (أدمن / أستاذ / طالب) -->
    <form id="unifiedLoginForm" class="auth-form active">
        <div class="form-group">
            <label><i class="fa-solid fa-envelope" style="color:var(--primary);"></i> اسم المستخدم أو البريد الإلكتروني</label>
            <input type="text" id="loginUser" required placeholder="ادخل اسم المستخدم الخاص بك">
        </div>
        <div class="form-group">
            <label><i class="fa-solid fa-lock" style="color:var(--primary);"></i> كلمة المرور السرية</label>
            <input type="password" id="loginPass" required placeholder="ادخل كلمة المرور الخاصة بك">
        </div>
        <button type="submit" class="btn-submit">دخول آمن للمنصة <i class="fa-solid fa-shield-halved"></i></button>
        <div id="loginError" class="msg error-msg">عذراً، بيانات الدخول غير صحيحة أو انتهى اشتراكك الزمني!</div>
    </form>

    <!-- 📝 2. نموذج إنشاء حساب طالب جديد وتصنيفه سحابياً -->
    <form id="studentRegisterForm" class="auth-form">
        <div class="form-group">
            <label>اسم الطالب الثلاثي (بالعربي)</label>
            <input type="text" id="regName" required placeholder="مثال: محمد أحمد العلي">
        </div>
        <div class="form-group">
            <label>اسم مستخدم بالإنجليزية (للدخول به)</label>
            <input type="text" id="regUser" required placeholder="مثال: khaled_2026">
        </div>
        <div class="form-group">
            <label>اختر كلمة مرور لحسابك</label>
            <input type="password" id="regPass" required placeholder="اكتب كلمة مرور قوية">
        </div>
        <div class="form-group">
            <label>رقم هاتف الطالب (مع رمز الدولة)</label>
            <input type="tel" id="regPhone" required placeholder="مثال: 963980302155+">
        </div>
        <div class="form-group">
            <label>المرحلة والفرع الدراسي</label>
            <select id="regClass">
                <option value="تاسع - أساسي">تاسع - شهادة تعليم أساسي</option>
                <option value="بكالوريا - فرع علمي">بكالوريا - فرع علمي</option>
                <option value="بكالوريا - فرع أدبي">بكالوريا - فرع أدبي</option>
            </select>
        </div>
        <div class="form-group">
            <label>الطائفة / الديانة المعتمَدة</label>
            <select id="regReligion">
                <option value="إسلامية">التربية الإسلامية</option>
                <option value="مسيحية">التربية المسيحية</option>
            </select>
        </div>
        <div class="form-group">
            <label>إيصال الدفع اليدوي (صورة أو PDF)</label>
            <div class="file-upload-wrapper" onclick="document.getElementById('regReceipt').click()">
                <i class="fa-solid fa-cloud-arrow-up" style="font-size:24px; color:var(--primary-glowing); margin-bottom:5px;"></i>
                <p id="fileUploadText" style="font-size:12px; color:var(--text-gray);">اضغط لرفع صورة إيصال الدفع البنكي أو الكاش</p>
                <input type="file" id="regReceipt" accept="image/*,application/pdf" style="display:none;" onchange="updateFileName(this)">
            </div>
        </div>
        <button type="submit" class="btn-submit">إرسال طلب التسجيل للمراجعة</button>
        <div id="regError" class="msg error-msg">اسم المستخدم هذا محجوز أو مسجل مسبقاً في النظام!</div>
        <div id="regSuccess" class="msg success-msg">تم إرسال طلبك بنجاح. حسابك حالياً (قيد المراجعة) لتفعيل الأيام من قبل المسؤول!</div>
    </form>
</div>
<script>
    if(localStorage.getItem('cms_site_logo')) {
        document.getElementById('loginLogo').src = localStorage.getItem('cms_site_logo');
    }

    function switchAuthTab(type) {
        document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
        document.querySelectorAll('.tab-buttons button').forEach(b => b.classList.remove('active'));
        document.getElementById('loginError').style.display = 'none';
        document.getElementById('regError').style.display = 'none';
        document.getElementById('regSuccess').style.display = 'none';

        if(type === 'login') {
            document.getElementById('unifiedLoginForm').classList.add('active');
            document.getElementById('tabLogin').classList.add('active');
        } else {
            document.getElementById('studentRegisterForm').classList.add('active');
            document.getElementById('tabRegister').classList.add('active');
        }
    }

    function updateFileName(input) {
        const textLabel = document.getElementById('fileUploadText');
        if(input.files.length > 0) {
            textLabel.innerText = "تم جلب إيصال الدفع بنجاح ✓";
            textLabel.style.color = "#22c55e";
        }
    }

    document.getElementById('unifiedLoginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const user = document.getElementById('loginUser').value.trim();
        const pass = document.getElementById('loginPass').value;
        const errorMsg = document.getElementById('loginError');

        if(user === 'admin' && pass === 'drasty2026') {
            sessionStorage.setItem('drasty_authenticated', 'true');
            sessionStorage.setItem('user_role', 'admin');
            window.location.href = 'dashboard.html';
            return;
        }

        let teachersList = JSON.parse(localStorage.getItem('drasty_teachers')) || [];
        let foundTeacher = teachersList.find(t => t.username === user && t.password === pass);
        if(foundTeacher) {
            sessionStorage.setItem('drasty_authenticated', 'true');
            sessionStorage.setItem('user_role', 'teacher');
            sessionStorage.setItem('teacher_name', foundTeacher.name);
            sessionStorage.setItem('teacher_subject', foundTeacher.subject);
            window.location.href = 'dashboard.html';
            return;
        }

        let studentsList = JSON.parse(localStorage.getItem('drasty_registered_students')) || [];
        let foundStudent = studentsList.find(s => s.username === user && s.password === pass);

        if(foundStudent) {
            if(foundStudent.status === 'Pending') {
                errorMsg.innerText = "حسابك قيد المراجعة، يرجى الانتظار لحين تأكيد إيصال الدفع من الإدارة.";
                errorMsg.style.display = 'block';
                return;
            }
            
            const approvedDate = foundStudent.approvedDate || Date.now();
            const daysAllowed = parseInt(foundStudent.daysDuration || 0);
            const msPassed = Date.now() - new Date(approvedDate).getTime();
            const daysPassed = Math.floor(msPassed / (1000 * 60 * 60 * 24));

            if(daysPassed >= daysAllowed) {
                errorMsg.innerText = "انتهت فترة اشتراكك المحددة بالمنصة (" + daysAllowed + " يوم). يرجى مراجعة الإدارة.";
                errorMsg.style.display = 'block';
                return;
            }

            sessionStorage.setItem('student_logged_in', 'true');
            sessionStorage.setItem('student_name', foundStudent.name);
            sessionStorage.setItem('student_class', foundStudent.class);
            sessionStorage.setItem('student_religion', foundStudent.religion);
            window.location.href = 'index.html';
        } else {
            errorMsg.innerText = "بيانات الدخول غير صحيحة، يرجى التأكد من الحساب أو مراجعة الإدارة.";
            errorMsg.style.display = 'block';
        }
    });

    document.getElementById('studentRegisterForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const name = document.getElementById('regName').value.trim();
        const user = document.getElementById('regUser').value.trim().toLowerCase();
        const pass = document.getElementById('regPass').value;
        const phone = document.getElementById('regPhone').value.trim();
        const sClass = document.getElementById('regClass').value;
        const sReligion = document.getElementById('regReligion').value;
        
        let studentsList = JSON.parse(localStorage.getItem('drasty_registered_students')) || [];
        
        if(studentsList.some(s => s.username === user) || user === 'admin') {
            document.getElementById('regError').style.display = 'block';
            return;
        }

        studentsList.push({ 
            name: name, 
            username: user, 
            password: pass, 
            phone: phone, 
            class: sClass, 
            religion: sReligion,
            status: 'Pending',
            daysDuration: 0
        });
        
        localStorage.setItem('drasty_registered_students', JSON.stringify(studentsList));
        document.getElementById('regError').style.display = 'none';
        document.getElementById('regSuccess').style.display = 'block';
        this.reset();
        
        document.getElementById('fileUploadText').innerText = "اضغط لرفع صورة إيصال الدفع البنكي أو الكاش";
        document.getElementById('fileUploadText').style.color = "var(--text-gray)";
        
        setTimeout(() => { switchAuthTab('login'); }, 3000);
    });
</script>
</body>
</html>
