workflows:
  default-workflow:
    name: Default Workflow
    max_build_duration: 10
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    triggering:
      events:
        - push
    scripts:
      - name: توليد مجلد الأندرويد المفقود وحقن الأيقونة سحابياً
        script: |
          flutter create --org net.drasty --template=app .
          flutter pub get
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
